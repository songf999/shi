<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>爱心小厨房</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #fef7e8;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Helvetica, 'Noto Sans', sans-serif;
            color: #2e241f;
            padding: 20px 16px 40px;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #c47b4c, #9b5a2e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 600;
        }
        .sub {
            font-size: 0.8rem;
            color: #b47c56;
            margin-top: 4px;
        }

        .mode-switch {
            display: flex;
            gap: 12px;
            background: #fff3e8;
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid #f0dbc8;
        }
        .mode-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #7c543b;
        }
        .mode-btn.active {
            background: #d99e5e;
            color: white;
            box-shadow: 0 2px 8px rgba(217, 158, 94, 0.2);
        }

        .menu-view, .order-view {
            transition: 0.2s;
        }
        .hidden {
            display: none;
        }

        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 20px;
            scrollbar-width: thin;
        }
        .cat-btn {
            flex: 0 0 auto;
            background: #fff3e8;
            border: 1px solid #f0dbc8;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #7c543b;
            cursor: pointer;
            white-space: nowrap;
        }
        .cat-btn.active {
            background: #d99e5e;
            border-color: #d99e5e;
            color: white;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .dish-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
            border: 1px solid #f5e3d4;
            cursor: pointer;
            transition: 0.05s linear;
            position: relative;
        }
        .dish-card:active {
            transform: scale(0.98);
        }
        .dish-img {
            background: #fef2e6;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
        }
        .dish-info {
            padding: 10px 12px 14px;
        }
        .dish-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }
        .dish-price {
            color: #c47b4c;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .dish-desc {
            font-size: 0.65rem;
            color: #9c7b64;
            margin-top: 4px;
        }
        .selected-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #d99e5e;
            color: white;
            border-radius: 30px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .order-only-container {
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            min-height: 400px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px dashed #f0dbca;
            padding-bottom: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .order-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #4d3522;
        }
        .order-stats {
            font-size: 0.75rem;
            background: #fef3ea;
            padding: 4px 12px;
            border-radius: 30px;
            color: #b87a54;
        }
        .order-list {
            list-style: none;
            margin-bottom: 16px;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f7e9df;
            gap: 12px;
            flex-wrap: wrap;
        }
        .order-item-info {
            flex: 2;
            min-width: 120px;
        }
        .order-item-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .order-item-price {
            font-size: 0.7rem;
            color: #b47c56;
            margin-top: 2px;
        }
        .order-item-detail {
            text-align: right;
            min-width: 80px;
        }
        .order-item-qty {
            font-weight: 600;
            font-size: 1rem;
            color: #d99e5e;
        }
        .order-item-subtotal {
            font-size: 0.8rem;
            color: #a1653a;
            margin-top: 2px;
        }
        /* 操作按钮组：增加/减少/删除 */
        .order-item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .qty-control-btn {
            background: #fff0e8;
            border: 1px solid #f0cdb5;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b95f2c;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .qty-control-btn:active {
            background: #f7ded0;
            transform: scale(0.96);
        }
        .delete-single-btn {
            background: #fff0e8;
            border: 1px solid #f0cdb5;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b95f2c;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .delete-single-btn:active {
            background: #f7ded0;
            transform: scale(0.96);
        }
        .order-footer {
            border-top: 1px solid #eedbcb;
            padding-top: 16px;
            margin-top: 8px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        .total-price {
            color: #c1682c;
            font-size: 1.35rem;
        }
        .empty-order {
            text-align: center;
            padding: 50px 0;
            color: #c8ad93;
            font-size: 0.9rem;
        }

        .sync-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 12px;
            flex-wrap: wrap;
        }
        .sync-btn {
            background: #fff0e2;
            border: 1px solid #f0dbc8;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #a1653a;
            cursor: pointer;
            transition: 0.1s;
        }
        .sync-btn:active {
            background: #e6d5c4;
        }
        .share-panel {
            background: #fff9f2;
            margin-top: 16px;
            border-radius: 24px;
            padding: 12px;
            font-size: 0.7rem;
            border: 1px solid #f0dfcf;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2e241fe6;
            backdrop-filter: blur(8px);
            color: #ffefdf;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #d6bc9f;
            margin-top: 20px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-secondary {
            flex: 1;
            background: #fff2e7;
            border: 1px solid #e1cbb9;
            padding: 10px 0;
            border-radius: 48px;
            font-weight: 500;
            color: #a57048;
            cursor: pointer;
            text-align: center;
        }
        @media (max-width: 480px) {
            .order-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .order-item-detail {
                text-align: left;
                width: 100%;
            }
            .order-item-actions {
                width: 100%;
                justify-content: flex-start;
                margin-top: 6px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>狐狸🦊食堂</h1>
        <div class="sub">· 爱心料理 · </div>
    </div>

    <div class="mode-switch">
        <div class="mode-btn active" data-mode="menu">📖 浏览菜单 & 点菜</div>
        <div class="mode-btn" data-mode="order">📋 已点清单 (加减/删除)</div>
    </div>

    <div class="sync-bar">
        <button class="sync-btn" id="exportShareBtn">📤 分享订单码 (同步给家人)</button>
        <button class="sync-btn" id="importSyncBtn">📥 导入同步码 (合并订单)</button>
        <button class="sync-btn" id="clearAllBtn">🗑️ 清空全部</button>
    </div>

    <div id="menuView" class="menu-view">
        <div class="categories" id="categoriesContainer"></div>
        <div class="menu-grid" id="menuGrid"></div>
        <div class="action-buttons">
            <div class="btn-secondary" id="quickResetBtn">🔄 重置我的点单</div>
        </div>
    </div>

    <div id="orderView" class="order-view hidden">
        <div class="order-only-container">
            <div class="order-header">
                <h2>🍽️ 家庭已点清单</h2>
                <div class="order-stats" id="orderStats">实时同步</div>
            </div>
            <div id="orderOnlyList">
                <div class="empty-order">✨ 暂无菜品，请在「点菜视图」中添加美食</div>
            </div>
            <div class="order-footer">
                <div class="total-row">
                    <span>合计爱心</span>
                    <span class="total-price" id="totalPriceOnly">0</span>
                </div>
                <div style="font-size:0.7rem; color:#b28b6a; text-align:center; margin-top:8px;">
                </div>
            </div>
        </div>
    </div>

    <div class="share-panel">
        💡 <strong>记得把分享码给🦊哦！！！</strong><br>
        🔄 <strong>输入🦊的分享码看看他给你准备的饭哦</strong><br>
        
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
  
    const MENU_RAW = [
        { id: "d1", name: "🍅 番茄牛腩", price: 58, category: "热菜", emoji: "🍲", desc: "软烂入味，酸甜开胃" },
        { id: "d2", name: "🐟 烤鱼（在学）", price: 68, category: "热菜", emoji: "🐟", desc: "鲜嫩少刺，原汁原味" },
        { id: "d3", name: "🥬 蚝油生菜", price: 22, category: "素菜", emoji: "🥬", desc: "脆嫩清爽" },
        { id: "d4", name: "🍤 宫保虾球", price: 66, category: "热菜", emoji: "🍤", desc: "微甜微辣，Q弹鲜美" },
        { id: "d5", name: "🍗 秘制烤鸡翅", price: 42, category: "热菜", emoji: "🍗", desc: "外焦里嫩" },
        { id: "d6", name: "🥘 麻婆豆腐", price: 28, category: "热菜", emoji: "🌶️", desc: "香辣下饭" },
        { id: "d7", name: "🥗 果蔬大拌菜", price: 26, category: "凉菜", emoji: "🥗", desc: "新鲜时蔬" },
        { id: "d8", name: "🍚 五常米饭", price: 3, category: "主食", emoji: "🍚", desc: "香糯米饭，按位算" },
        { id: "d9", name: "🥟 手工水饺", price: 32, category: "主食", emoji: "🥟", desc: "猪肉白菜馅，12只" },
        { id: "d10", name: "🍲 酸辣汤", price: 24, category: "汤品", emoji: "🥣", desc: "酸辣暖胃" },
        { id: "d11", name: "🍢 羊肉串 (3串)", price: 36, category: "热菜", emoji: "🍢", desc: "孜然香气" },
        { id: "d12", name: "🥒 拍黄瓜", price: 16, category: "凉菜", emoji: "🥒", desc: "蒜香爽口" },
        { id: "d13", name: "🍅 番茄炒蛋", price: 16, category: "热菜", emoji: "🍅", desc: "酸甜可口" },
        { id: "d14", name: "🍜 凉皮", price: 16, category: "主食", emoji: "🍜", desc: "清爽开胃" },
        { id: "d15", name: "🍎 苹果", price: 16, category: "水果", emoji: "🍎", desc: "一天一苹果，医生远离我" }
    ];
    const FINAL_MENU = [];
    const idSet = new Set();
    for (let dish of MENU_RAW) {
        if (!idSet.has(dish.id)) {
            idSet.add(dish.id);
            FINAL_MENU.push(dish);
        }
    }
    
    const categoriesSet = ["全部", ...new Set(FINAL_MENU.map(d => d.category))];
    let currentCategory = "全部";
    
    // 订单状态
    let orderMap = new Map();   // dishId -> quantity
    const STORAGE_KEY = "family_order_split_view";
    let currentView = 'menu';
    
    // ---------- 存储 & 渲染核心 ----------
    function loadOrderFromStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                orderMap.clear();
                if (typeof parsed === 'object') {
                    for (let [id, qty] of Object.entries(parsed)) {
                        if (qty > 0 && FINAL_MENU.some(d => d.id === id)) orderMap.set(id, qty);
                    }
                }
            } catch(e) { console.warn(e); }
        }
        renderAllViews();
    }
    
    function persistOrder() {
        const obj = {};
        for (let [id, qty] of orderMap.entries()) obj[id] = qty;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
        window.dispatchEvent(new CustomEvent('order-updated-split', { detail: obj }));
        renderAllViews();
    }
    
    // 核心数量修改：delta可为 +1 或 -1
    function updateDishQuantity(dishId, delta) {
        const dish = FINAL_MENU.find(d => d.id === dishId);
        if (!dish) return;
        const currentQty = orderMap.get(dishId) || 0;
        let newQty = currentQty + delta;
        if (newQty <= 0) {
            orderMap.delete(dishId);
        } else {
            orderMap.set(dishId, newQty);
        }
        persistOrder();
        const qtyNow = orderMap.get(dishId) || 0;
        const actionIcon = delta > 0 ? '➕' : '➖';
        if (qtyNow === 0) {
            showToast(`🗑️ 已移除 ${dish.name}`, 700);
        } else {
            showToast(`${actionIcon} ${dish.name} x${qtyNow}`, 700);
        }
    }
    
    // 整份删除 (一键清除该菜品)
    function deleteEntireDish(dishId) {
        const dish = FINAL_MENU.find(d => d.id === dishId);
        if (!dish) return;
        if (!orderMap.has(dishId)) {
            showToast(`❓ ${dish.name} 不在清单中`, 800);
            return;
        }
        orderMap.delete(dishId);
        persistOrder();
        showToast(`🗑️ 已删除「${dish.name}」`, 1000);
    }
    
    function clearAllOrders() {
        if (orderMap.size === 0) return;
        orderMap.clear();
        persistOrder();
        showToast("🗑️ 已清空所有菜品", 1000);
    }
    
    function resetCurrentOrders() {
        orderMap.clear();
        persistOrder();
        showToast("🔄 菜单已重置", 800);
    }
    
    // 分享与导入
    function generateShareCode() {
        const orderObj = {};
        for (let [id, qty] of orderMap.entries()) orderObj[id] = qty;
        const jsonStr = JSON.stringify(orderObj);
        return btoa(encodeURIComponent(jsonStr));
    }
    
    function applyShareCode(code) {
        try {
            const decoded = decodeURIComponent(atob(code));
            const importedOrder = JSON.parse(decoded);
            if (typeof importedOrder !== 'object') throw new Error();
            let addedCount = 0;
            for (let [id, qty] of Object.entries(importedOrder)) {
                if (qty > 0 && FINAL_MENU.some(d => d.id === id)) {
                    const current = orderMap.get(id) || 0;
                    const newQty = current + qty;
                    if (newQty > 0) {
                        orderMap.set(id, newQty);
                    } else {
                        orderMap.delete(id);
                    }
                    addedCount++;
                }
            }
            persistOrder();
            showToast(`✅ 同步成功！合并了 ${addedCount} 种菜品`, 2000);
            return true;
        } catch(e) {
            showToast("❌ 同步码无效，请重新复制", 1500);
            return false;
        }
    }
    
    function shareOrder() {
        const shareCode = generateShareCode();
        const textarea = document.createElement('textarea');
        textarea.value = shareCode;
        document.body.appendChild(textarea);
        textarea.select();
        const success = document.execCommand('copy');
        document.body.removeChild(textarea);
        if (success) {
            showToast("📋 同步码已复制！发送给家人，对方点击「导入同步码」即可合并订单", 2500);
        } else {
            prompt("手动复制下方同步码👇", shareCode);
        }
    }
    
    function importOrderFromPrompt() {
        const code = prompt("📲 请输入家人分享的同步码：");
        if (code && code.trim()) applyShareCode(code.trim());
        else showToast("未输入同步码", 800);
    }
    
    // 渲染所有视图
    function renderAllViews() {
        renderMenuView();
        renderOrderOnlyView();
    }
    
    // 菜单视图：分类 + 菜品卡片 (点击 +1)
    function renderMenuView() {
        renderCategories();
        const filtered = currentCategory === "全部" ? FINAL_MENU : FINAL_MENU.filter(d => d.category === currentCategory);
        const grid = document.getElementById('menuGrid');
        if (!grid) return;
        grid.innerHTML = filtered.map(dish => `
            <div class="dish-card" data-id="${dish.id}">
                <div class="dish-img">${dish.emoji}</div>
                <div class="dish-info">
                    <div class="dish-name">
                        <span>${dish.name}</span>
                        <span class="dish-price">${dish.price}</span>
                    </div>
                    <div class="dish-desc">${dish.desc}</div>
                </div>
                ${orderMap.has(dish.id) ? `<div class="selected-badge">${orderMap.get(dish.id)}</div>` : ''}
            </div>
        `).join('');
        
        document.querySelectorAll('#menuGrid .dish-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = card.dataset.id;
                if (id) updateDishQuantity(id, 1);
            });
        });
    }
    
    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        container.innerHTML = categoriesSet.map(cat => `
            <button class="cat-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>
        `).join('');
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentCategory = btn.dataset.cat;
                renderMenuView();
            });
        });
    }
    
 
    function renderOrderOnlyView() {
        const container = document.getElementById('orderOnlyList');
        const totalSpan = document.getElementById('totalPriceOnly');
        const statsSpan = document.getElementById('orderStats');
        if (!container) return;
        
        if (orderMap.size === 0) {
            container.innerHTML = '<div class="empty-order">🍽️ 还没有点任何菜品，请切换到「浏览菜单」添加美味～</div>';
            if (totalSpan) totalSpan.innerText = '0';
            if (statsSpan) statsSpan.innerText = '0道菜';
            return;
        }
        
        let total = 0;
        const items = [];
        for (let [id, qty] of orderMap.entries()) {
            const dish = FINAL_MENU.find(d => d.id === id);
            if (!dish) continue;
            const subtotal = dish.price * qty;
            total += subtotal;
            items.push({ dish, qty, subtotal, id });
        }
        
        // 渲染订单列表，每个菜品带 加/减/删除 按钮
        const html = `
            <ul class="order-list">
                ${items.map(item => `
                    <li class="order-item" data-dish-id="${item.id}">
                        <div class="order-item-info">
                            <div class="order-item-name">${item.dish.name}</div>
                            <div class="order-item-price">${item.dish.price} / 份</div>
                        </div>
                        <div class="order-item-detail">
                            <div class="order-item-qty">✖️ ${item.qty}</div>
                            <div class="order-item-subtotal">❤️ ${item.subtotal}</div>
                        </div>
                        <div class="order-item-actions">
                            <button class="qty-control-btn increment-btn" data-id="${item.id}" data-delta="1">➕ 加一份</button>
                            <button class="qty-control-btn decrement-btn" data-id="${item.id}" data-delta="-1">➖ 减一份</button>
                            <button class="delete-single-btn" data-id="${item.id}">❌ 整份删除</button>
                        </div>
                    </li>
                `).join('')}
            </ul>
        `;
        container.innerHTML = html;
        
    
        document.querySelectorAll('#orderOnlyList .increment-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const dishId = btn.getAttribute('data-id');
                if (dishId) updateDishQuantity(dishId, 1);
            });
        });
 
        document.querySelectorAll('#orderOnlyList .decrement-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const dishId = btn.getAttribute('data-id');
                if (dishId) updateDishQuantity(dishId, -1);
            });
        });
 
        document.querySelectorAll('#orderOnlyList .delete-single-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const dishId = btn.getAttribute('data-id');
                if (dishId) deleteEntireDish(dishId);
            });
        });
        
        if (totalSpan) totalSpan.innerText = `❤${total}`;
        if (statsSpan) statsSpan.innerText = `${items.length}种菜品`;
    }
    
    function showToast(msg, duration = 1500) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }
    
    function setView(view) {
        currentView = view;
        const menuViewDiv = document.getElementById('menuView');
        const orderViewDiv = document.getElementById('orderView');
        const modeBtns = document.querySelectorAll('.mode-btn');
        
        if (view === 'menu') {
            menuViewDiv.classList.remove('hidden');
            orderViewDiv.classList.add('hidden');
            modeBtns.forEach(btn => {
                if (btn.dataset.mode === 'menu') btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderMenuView();
        } else {
            menuViewDiv.classList.add('hidden');
            orderViewDiv.classList.remove('hidden');
            modeBtns.forEach(btn => {
                if (btn.dataset.mode === 'order') btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderOrderOnlyView();
        }
    }
    
    // 跨标签页同步
    function setupCrossTabSync() {
        window.addEventListener('order-updated-split', (e) => {
            if (e.detail) {
                const newOrder = e.detail;
                orderMap.clear();
                for (let [id, qty] of Object.entries(newOrder)) {
                    if (qty > 0) orderMap.set(id, qty);
                }
                renderAllViews();
                if (currentView === 'order') renderOrderOnlyView();
            }
        });
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY && e.newValue) {
                try {
                    const parsed = JSON.parse(e.newValue);
                    orderMap.clear();
                    for (let [id, qty] of Object.entries(parsed)) {
                        if (qty > 0) orderMap.set(id, qty);
                    }
                    renderAllViews();
                    if (currentView === 'order') renderOrderOnlyView();
                } catch(er) {}
            }
        });
    }
    
    function bindEvents() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                if (mode === 'menu') setView('menu');
                else if (mode === 'order') setView('order');
            });
        });
        
        const exportBtn = document.getElementById('exportShareBtn');
        const importBtn = document.getElementById('importSyncBtn');
        const clearBtn = document.getElementById('clearAllBtn');
        const resetBtn = document.getElementById('quickResetBtn');
        
        if (exportBtn) exportBtn.addEventListener('click', shareOrder);
        if (importBtn) importBtn.addEventListener('click', importOrderFromPrompt);
        if (clearBtn) clearBtn.addEventListener('click', clearAllOrders);
        if (resetBtn) resetBtn.addEventListener('click', resetCurrentOrders);
    }
    
    function init() {
        loadOrderFromStorage();
        bindEvents();
        setupCrossTabSync();
        setView('menu');
    }
    
    init();
</script>
</body>
</html>
